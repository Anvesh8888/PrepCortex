<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PrepCortex Arena</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
    body { 
    /* The GitHub background link */
    background-image: url('https://raw.githubusercontent.com/Anvesh8888/PrepCortex/main/purple_pattern_bg.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    background-color: #1e293b; 

    color: white; 
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
    
    /* THE CENTERING MAGIC */
    display: flex; 
    flex-direction: column; 
    align-items: center;      /* Horizontal center */
    justify-content: center;   /* Vertical center */
    margin: 0;
    height: 100vh;            /* Forces body to be exactly the height of the screen */
    width: 100vw;             /* Forces body to be the full width */
    overflow: hidden;         /* Prevents accidental scrollbars during the quiz */
    box-sizing: border-box;
}

.card { 
    background: #0f172a; 
    padding: 40px; 
    border-radius: 20px; 
    width: 90%; 
    max-width: 500px; 
    text-align: center; 
    border: 1px solid rgba(56, 189, 248, 0.2); 
    box-shadow: 0 15px 40px rgba(0,0,0,0.5); 
    
    /* Ensures the card doesn't jump if content changes */
    display: flex;
    flex-direction: column;
    justify-content: center;
}

    h1, h2, h4 { color: #38bdf8; margin-top: 0; }
    
    input[type="text"], input[type="number"], input[type="file"] { 
        width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; 
        border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; 
    }

    button { 
        width: 100%; padding: 15px; margin-bottom: 10px; 
        background: linear-gradient(135deg, #0ea5e9, #38bdf8); 
        border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; 
        transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover:not(:disabled) { 
        transform: translateY(-2px); 
        box-shadow: 0 5px 15px rgba(14, 165, 233, 0.4);
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary { background: #334155; }
    .hidden { display: none; }

    .player-list { 
        text-align: left; background: rgba(56, 189, 248, 0.05); 
        padding: 15px; border-radius: 10px; margin: 20px 0;
    }

    .option-btn { 
        background: #1e293b; border: 1px solid #38bdf8; margin-top: 10px; transition: 0.2s; 
    }

    .option-btn:hover:not(:disabled) { background: #38bdf8; color: #0f172a; }

    .score-row { 
        display: flex; justify-content: space-between; padding: 10px 0; 
        border-bottom: 1px solid rgba(255,255,255,0.1); 
    }

    .q-tracker { 
        font-size: 14px; color: #94a3b8; text-transform: uppercase; 
        letter-spacing: 2px; margin-bottom: 10px; 
    }
</style>
</head>
<body>
    <div style="position: absolute; top: 20px; right: 30px; text-align: right; background: rgba(15, 23, 42, 0.8); padding: 10px 20px; border-radius: 15px; border: 1px solid rgba(56, 189, 248, 0.3); backdrop-filter: blur(5px); z-index: 100;">
        <div id="user-title" style="color: #38bdf8; font-weight: 800; font-size: 18px; letter-spacing: 1px;">Loading...</div>
        <div id="user-level" style="color: #94a3b8; font-size: 13px; font-weight: bold; margin-top: 3px;"></div>
    </div>

    <div class="card" id="join-screen">
        <h1>Arena Lobby</h1>
        <input type="text" id="username" placeholder="Pick a username">
        <button onclick="createRoom()">Create New Room (Host)</button>
        <div style="margin: 15px 0; color: #94a3b8;">— OR —</div>
        <input type="text" id="room-input" placeholder="Enter 4-digit code">
        <button class="btn-secondary" onclick="joinRoom()">Join Room</button>
        <br><br>
        <a href="/" style="color: #94a3b8; text-decoration: none; font-size: 14px;">← Back to Planner</a>
    </div>

    <div class="card hidden" id="lobby-screen">
        <h2>Room Code: <span id="display-code" style="color: white;"></span></h2>
        <div class="player-list" id="players-list"></div>
        
        <div id="host-controls" class="hidden">
            <h4 style="margin-top: 20px; text-align: left;">Quiz Generator</h4>
            <input type="file" id="pdf-upload" accept=".pdf">
            <input type="number" id="num-questions" placeholder="How many questions? (e.g. 5)" value="5">
            <button id="start-btn" onclick="generateAndStart()">Generate AI Quiz & Start</button>
            <p id="loading-msg" class="hidden" style="color: #38bdf8;">Reading PDF & Generating Quiz... (Takes ~10s)</p>
        </div>

        <p id="waiting-msg" class="hidden" style="color: #94a3b8;">Waiting for host to start...</p>
    </div>

    <div class="card hidden" id="game-screen">
        <div class="q-tracker" id="q-tracker">Question 1 of 5</div>
        <h3 id="question-text">Question goes here?</h3>
        <div id="options-container"></div>
        <h4 id="status-msg" style="margin-top: 20px; color: #94a3b8;" class="hidden">Waiting for others to answer...</h4>
        
        <div class="player-list" id="live-scores-container">
            <h4 style="margin-top:0; color:#38bdf8;">Current Scores</h4>
            <div id="live-scores"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='cortex.js') }}"></script>
    <script>
        const socket = io({ transports: ['websocket'], upgrade: false });
        let myRoomCode = "";
        // --- ACHIEVEMENT TRACKERS ---
        let currentStreak = 0;
        let maxStreak = 0;
        let myLastScore = 0;
        let totalQuizQuestions = 0;

        // --- ROOM LOGIC ---
        function createRoom() {
            const user = document.getElementById('username').value;
            if(!user) return alert("Enter username");
            socket.emit('create_room', { username: user });
        }

        function joinRoom() {
            const user = document.getElementById('username').value;
            const code = document.getElementById('room-input').value;
            if(!user || !code) return alert("Enter username and code");
            socket.emit('join_room', { username: user, room_code: code });
        }

        // --- PDF GENERATION LOGIC ---
        async function generateAndStart() {
            const fileInput = document.getElementById('pdf-upload');
            const numQuestions = document.getElementById('num-questions').value;
            
            if(!fileInput.files[0]) return alert("Please upload a PDF first!");

            // Show loading UI
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('loading-msg').classList.remove('hidden');

            const formData = new FormData();
            formData.append('pdf', fileInput.files[0]);
            formData.append('num_questions', numQuestions);

            try {
                // Send PDF to Flask HTTP Route
                const response = await fetch('/generate_quiz', { method: 'POST', body: formData });
                const data = await response.json();

                if(data.error) throw new Error(data.error);

                // If successful, send the generated questions to Socket to start game
                socket.emit('start_game', { room_code: myRoomCode, questions: data.questions });
            } catch (err) {
                alert("Failed to generate quiz: " + err.message);
                document.getElementById('start-btn').classList.remove('hidden');
                document.getElementById('loading-msg').classList.add('hidden');
            }
        }

        function submitAnswer(index) {
            socket.emit('submit_answer', { room_code: myRoomCode, answer: index });
            // Disable buttons immediately so they can't double-click
            document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
        }

        // --- SOCKET LISTENERS ---
        socket.on('room_created', (data) => {
            myRoomCode = data.room_code;
            document.getElementById('display-code').innerText = myRoomCode;
            document.getElementById('host-controls').classList.remove('hidden');
            updatePlayers(data.players);
            switchScreen('lobby-screen');
        });

        socket.on('join_success', (data) => {
            myRoomCode = data.room_code;
            document.getElementById('display-code').innerText = myRoomCode;
            document.getElementById('waiting-msg').classList.remove('hidden');
            switchScreen('lobby-screen');
        });

        socket.on('player_joined', (data) => updatePlayers(data.players));

        socket.on('new_question', (data) => {
            switchScreen('game-screen');
            document.getElementById('status-msg').classList.add('hidden');
            document.getElementById('live-scores-container').classList.remove('hidden');
            
            // Store total questions for achievement check later
            totalQuizQuestions = data.total; 
            
            // Reset streak logic if it's the very first question
            if (data.current === 1) {
                currentStreak = 0; maxStreak = 0; myLastScore = 0;
            }
            
            document.getElementById('q-tracker').innerText = `Question ${data.current} of ${data.total}`;
            document.getElementById('question-text').innerText = data.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            data.options.forEach((opt, idx) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = opt;
                b.onclick = () => submitAnswer(idx);
                container.appendChild(b);
            });
        });

        // Triggered only for the person who just answered
        socket.on('waiting_for_others', () => {
            document.getElementById('status-msg').classList.remove('hidden');
        });

        // Triggered when EVERYONE has answered
        socket.on('round_results', (data) => {
            document.getElementById('status-msg').innerText = "Round over! Next question in 3 seconds...";
            const scoreDiv = document.getElementById('live-scores');
            
            // Streak Tracking Logic
            const myUsername = document.getElementById('username').value;
            const myData = data.players.find(p => p.username === myUsername);
            if (myData) {
                if (myData.score > myLastScore) {
                    currentStreak++; // Score went up, streak continues
                    if (currentStreak > maxStreak) maxStreak = currentStreak;
                } else {
                    currentStreak = 0; // Score didn't go up, streak broken
                }
                myLastScore = myData.score;
            }

            scoreDiv.innerHTML = data.players
                .sort((a,b) => b.score - a.score)
                .map(p => `<div class="score-row"><span>${p.username}</span><span>${p.score} pts</span></div>`).join('');
        });

        // --- THE UPGRADED GAME OVER SCREEN ---
        socket.on('game_over', (data) => {
            document.getElementById('q-tracker').innerText = "QUIZ COMPLETE";
            document.getElementById('question-text').innerText = "🏆 Final Rankings";
            document.getElementById('status-msg').classList.add('hidden');
            
            // HIDE THE LIVE SCORES PANEL
            document.getElementById('live-scores-container').classList.add('hidden');
            
            // --- CORTEX GAMIFICATION LOGIC ---
            const myUsername = document.getElementById('username').value;
            const myData = data.players.find(p => p.username === myUsername);
            
            // Sort players to figure out rank
            const sortedPlayers = data.players.sort((a,b) => b.score - a.score);
            const myRank = sortedPlayers.findIndex(p => p.username === myUsername) + 1;
            const totalPlayers = sortedPlayers.length;
            
            if (myData && myData.score > 0) {
                const earnedXP = myData.score * 5;
                addXP(earnedXP, 'Quiz Performance');
            }
            
            logActivity('quiz');
            
            // Fire the Arena achievement checks!
            checkAchievements('quiz_finished', {
                score: myData ? myData.score : 0,
                totalQs: totalQuizQuestions,
                maxStreak: maxStreak,
                totalPlayers: totalPlayers,
                rank: myRank
            });
            // ----------------------------------

            // Generate Final Rankings
            const sortedPlayers = data.players.sort((a,b) => b.score - a.score);
            let resultHTML = '<div class="player-list">';
            sortedPlayers.forEach((p, index) => {
                let medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '👤';
                resultHTML += `<div class="score-row"><span>${medal} ${p.username}</span> <span>${p.score} pts</span></div>`;
            });
            resultHTML += '</div>';
            
            // ADD LINKS TO PLANNER & LOBBY
            resultHTML += `
                <div style="margin-top: 25px; display: flex; flex-direction: column; gap: 10px;">
                    <button onclick="window.location.reload()">Play Again (Arena Lobby)</button>
                    <button class="btn-secondary" onclick="window.location.href='/'">Return to Planner</button>
                </div>
            `;
            
            document.getElementById('options-container').innerHTML = resultHTML;
        });

        socket.on('error', (data) => alert(data.message));

        // --- HELPERS ---
        function switchScreen(id) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function updatePlayers(players) {
            document.getElementById('players-list').innerHTML = players.map(p => `<p>🟢 ${p.username}</p>`).join('');
            
            // Also update the live scoreboard if a player joins late
            const scoreDiv = document.getElementById('live-scores');
            if(scoreDiv) {
                scoreDiv.innerHTML = players
                    .sort((a,b) => b.score - a.score)
                    .map(p => `<div class="score-row"><span>${p.username}</span><span>${p.score} pts</span></div>`).join('');
            }
        }

        // Helper to turn 1 into "1st", 2 into "2nd", etc.
        function getOrdinal(n) {
            const s = ["th", "st", "nd", "rd"];
            const v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }
    </script>
</body>
</html>
