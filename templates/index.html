<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepCortex AI</title>
    <style>
        body { 
            background-color: #1e293b; 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background-color: #0f172a;
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header h1 { margin: 0; font-size: 48px; color: #38bdf8; font-weight: 800; line-height: 1; }
        header p { margin: 8px 0 0 0; font-size: 14px; color: #94a3b8; font-weight: 500; text-transform: uppercase; letter-spacing: 3px; }

        .arena-link {
            text-decoration: none;
            color: #38bdf8;
            border: 2px solid #38bdf8;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .arena-link:hover {
            background: #38bdf8;
            color: #0f172a;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .controls-card { 
            background: #0f172a; 
            padding: 35px 40px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 500px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 40px; 
            box-sizing: border-box;
        }

        input, select { 
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; 
            border: 1px solid #334155; background: #1e293b; color: white; font-size: 16px;
            box-sizing: border-box;
        }

        button { 
            width: 100%; padding: 15px; background: linear-gradient(135deg, #0ea5e9, #38bdf8); 
            border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: transform 0.2s;
        }

        button:hover { transform: translateY(-2px); }

        .response-card {
            background: #0f172a; padding: 40px; border-radius: 20px; width: 95%; max-width: 1200px; 
            border: 1px solid rgba(56, 189, 248, 0.2); box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            box-sizing: border-box; margin-bottom: 50px;
        }

        /* Markdown Table Styling */
        .result-content table { width: 100%; border-collapse: collapse; margin: 20px 0; background: rgba(255, 255, 255, 0.02); }
        .result-content th { background-color: #38bdf8; color: #0f172a; padding: 15px; text-align: left; }
        .result-content td { padding: 15px; border-bottom: 1px solid rgba(56, 189, 248, 0.1); color: #e2e8f0; }
        .result-content h2 { color: #38bdf8; border-bottom: 1px solid rgba(56, 189, 248, 0.2); padding-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>PrepCortex</h1>
        <p>AI driven study planner</p>
    </header>

    <a href="/quiz" class="arena-link">🎮 Enter Multiplayer Arena</a>

    {% if error %}
    <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #f87171; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; width: 100%; max-width: 500px; box-sizing: border-box;">
        ⚠️ {{ error }}
    </div>
    {% endif %}

    <div class="controls-card">
        <form method="POST" id="planner-form" onsubmit="showLoading()">
            <input type="number" name="days" placeholder="Days until exam" required>
            <input type="text" name="subjects" placeholder="Subjects (e.g. Biology, Calc)" required>
            <select name="difficulty">
                <option value="easy">Easy Pacing</option>
                <option value="moderate" selected>Moderate Pacing</option>
                <option value="intense">Intense Pacing</option>
            </select>
            <input type="number" name="hours" placeholder="Hours per day" required>
            <button type="submit" id="submit-btn">Generate Plan</button>
        </form>

        <p id="loading-msg" class="hidden" style="color: #38bdf8; text-align: center; margin-top: 15px; font-weight: bold;">
            AI will be crafting your schedule... (Please wait ~10 seconds)
        </p>
    </div>

    <script>
        function showLoading() {
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('loading-msg').style.display = 'block';
            document.getElementById('loading-msg').classList.remove('hidden');
        }
    </script>

    {% if planner %}
    <div class="response-card">
        <div class="result-content">{{ planner|safe }}</div>
    </div>
    {% endif %}
</body>
</html>
