<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepCortex AI</title>
    <style>
        /* --- BASE PAGE STYLING --- */
        body { 
            background-color: #1e293b; /* Slate blue background */
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* --- TOP HEADER STRIP --- */
        header {
            width: 100%;
            background-color: #0f172a; /* Darker blue strip */
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        header h1 {
            margin: 0;
            font-size: 48px; /* Big Brand Name */
            color: #38bdf8;
            font-weight: 800;
            line-height: 1;
        }

        header p {
            margin: 8px 0 0 0; 
            font-size: 14px; 
            color: #94a3b8; 
            font-weight: 500;
            text-transform: uppercase; 
            letter-spacing: 3px; 
        }

        /* --- UPPER BOX: The Controls --- */
        .controls-card { 
            background: #0f172a; 
            padding: 35px 40px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 500px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 40px; 
            box-sizing: border-box;
        }

        input, select { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 15px; 
            border-radius: 10px; 
            border: 1px solid #334155; 
            background: #1e293b; 
            color: white; 
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.3);
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(135deg, #0ea5e9, #38bdf8); 
            border: none; 
            border-radius: 10px; 
            color: white;
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer; 
            margin-top: 10px; 
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.4);
        }

        /* --- ERROR HANDLING --- */
        .error-card {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        /* --- LOWER BOX: The Response --- */
        .response-card {
            background: #0f172a; 
            padding: 40px;
            border-radius: 20px;
            width: 95%; /* Small space at the sides */
            max-width: 1200px; /* Expansive wide look */
            border: 1px solid rgba(56, 189, 248, 0.2); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            box-sizing: border-box;
            margin-bottom: 50px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- AI MARKDOWN STYLING (Tables, Headers, Lists) --- */
        .result-content { 
            line-height: 1.8; 
            font-size: 17px;
            color: #cbd5e1;
        }

        .result-content table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            overflow: hidden; /* Keeps the rounded corners on the table */
        }

        .result-content th {
            background-color: #38bdf8;
            color: #0f172a;
            padding: 15px;
            text-align: left;
            font-weight: bold;
        }

        .result-content td {
            padding: 15px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
            color: #e2e8f0;
        }

        .result-content tr:hover td {
            background: rgba(56, 189, 248, 0.05); /* Highlight row on hover */
        }

        .result-content h1, .result-content h2, .result-content h3 {
            color: #38bdf8;
            margin-top: 30px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            padding-bottom: 10px;
        }

        .result-content ul, .result-content ol {
            padding-left: 20px;
            color: #e2e8f0;
        }

        .result-content li {
            margin-bottom: 10px;
        }

        .result-content strong {
            color: #38bdf8; /* Makes bold text stand out */
        }
    </style>
</head>
<body>

    <header>
        <h1>PrepCortex</h1>
        <p>AI driven study planner</p>
    </header>

    {% if error %}
    <div class="error-card">
        {{ error }}
    </div>
    {% endif %}

    <div class="controls-card">
        <form method="POST">
            <input type="number" name="days" placeholder="Days until exam" required>
            <input type="text" name="subjects" placeholder="Subjects (e.g. Math, Physics)" required>
            <select name="difficulty">
                <option value="easy">Easy Pacing</option>
                <option value="moderate" selected>Moderate Pacing</option>
                <option value="intense">Intense Pacing</option>
            </select>
            <input type="number" name="hours" placeholder="Hours per day" required>
            <button type="submit">Generate Plan</button>
        </form>
    </div>

    {% if planner %}
    <div class="response-card">
        <div class="result-content">{{ planner|safe }}</div>
    </div>
    {% endif %}

</body>
</html>
